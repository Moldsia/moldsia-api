services:
  - type: web
    name: moldsia-api
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: MOLDSIA_CORS_ALLOWED_ORIGINS
        value: https://moldsia.com.br,https://www.moldsia.com.br
      - key: MOLDSIA_MAX_UPLOAD_SIZE_MB
        value: "250"
      - key: MOLDSIA_PROCESSING_TIMEOUT_SECONDS
        value: "90"
